<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RYS3N | Shop</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>

<a href="index.html" class="logo">
    <img src="logo.png" alt="RYS3N Logo">
</a>

<div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
</div>

</nav>

<div class="page-content">

<h1 class="section-title">SHOP</h1>

<div class="product-card">

    <div class="carousel">

        <button class="carousel-btn prev" onclick="changeSlide(-1)">
            ❮
        </button>

        <!-- Replace these image names with your own -->
        <img id="RiseAboveBoxTee"
             src="Prototypefront.jpg"
             alt="RiseAboveBoxTee">

        <button class="carousel-btn next" onclick="changeSlide(1)">
            ❯
        </button>

    </div>

    <h2 class="product-name">Rise Above Box Tee</h2>

    <p class="product-price">$40.99</p>

</div>

</div>

<footer>
© 2026 RYS3N. All Rights Reserved.
</footer>

<script>

const images = [
    "Prototypefront.jpg",
    "Prototypeback.jpg"
];

let currentSlide = 0;

function changeSlide(direction) {

    currentSlide += direction;

    if (currentSlide < 0) {
        currentSlide = images.length - 1;
    }

    if (currentSlide >= images.length) {
        currentSlide = 0;
    }

    document.getElementById("product-image").src =
        images[currentSlide];
}

</script>

</body>
</html>
